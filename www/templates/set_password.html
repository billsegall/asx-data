{% extends "base.html" %}
{% block title %}Set Password — ASX Data{% endblock %}
{% block content %}
<div class="flex justify-center items-start pt-16">
    <div class="bg-gray-900 border border-gray-800 rounded-lg p-8 w-full max-w-sm">
        <h1 class="text-xl font-semibold text-gray-100 mb-2">Set your password</h1>
        <p class="text-sm text-gray-400 mb-6">Choose a password for your account before continuing.</p>
        {% if error %}
        <div class="mb-4 text-sm text-red-400 bg-red-900/30 border border-red-800 rounded px-3 py-2">{{ error }}</div>
        {% endif %}
        <form method="POST" class="flex flex-col gap-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1" for="password">New password</label>
                <input id="password" name="password" type="password" required autofocus minlength="8"
                       class="w-full bg-gray-800 border border-gray-700 text-gray-100 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1" for="confirm">Confirm password</label>
                <input id="confirm" name="confirm" type="password" required minlength="8"
                       class="w-full bg-gray-800 border border-gray-700 text-gray-100 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit"
                    class="mt-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium py-2 rounded">
                Set password
            </button>
        </form>
    </div>
</div>
{% endblock %}
