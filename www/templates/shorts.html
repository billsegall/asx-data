{% extends "base.html" %}

{% block title %}ASX Shorts &mdash; Current{% endblock %}

{% block content %}
<div class="flex flex-wrap items-center justify-between gap-4 mb-4">
    <h1 class="text-2xl font-bold text-white">
        Current Short Positions
        <span id="as-of" class="text-gray-500 font-normal text-lg"></span>
        <span id="count" class="text-gray-500 font-normal text-base ml-2"></span>
    </h1>
    <div class="flex items-center gap-4">
        <label class="flex items-center gap-2 text-sm text-gray-400 cursor-pointer select-none">
            <input id="hide-zero" type="checkbox" checked class="accent-blue-500 w-4 h-4">
            Hide zero positions
        </label>
        <input id="filter" type="text" placeholder="Filter by symbol or company name&hellip;"
               class="bg-gray-800 border border-gray-700 text-gray-100 text-sm rounded px-3 py-1.5 w-80 focus:outline-none focus:border-blue-500"
               style="text-transform:uppercase" autocomplete="off">
    </div>
</div>

<div class="overflow-x-auto rounded-lg border border-gray-800">
    <table id="shorts-table" class="w-full text-sm">
        <thead>
            <tr class="bg-gray-900 text-gray-400 text-left select-none">
                <th class="px-4 py-3 font-medium hover:text-white cursor-pointer" onclick="sortTable(0)">Symbol &#x21C5;</th>
                <th class="px-4 py-3 font-medium hover:text-white cursor-pointer" onclick="sortTable(1)">Name &#x21C5;</th>
                <th class="px-4 py-3 font-medium hover:text-white cursor-pointer" onclick="sortTable(2)">Date &#x21C5;</th>
                <th class="px-4 py-3 font-medium hover:text-white cursor-pointer" onclick="sortTable(3)">Short % &#x21C5;</th>
            </tr>
        </thead>
        <tbody id="tbody">
            <tr><td colspan="3" class="px-4 py-6 text-center text-gray-500">Loading&hellip;</td></tr>
        </tbody>
    </table>
</div>

<style>
#shorts-table tbody tr { border-top: 1px solid #1f2937; }
#shorts-table tbody tr:hover { background: rgba(31,41,55,0.5); }
#shorts-table tbody tr:nth-child(odd) { background: rgba(17,24,39,0.3); }
#shorts-table tbody tr:nth-child(odd):hover { background: rgba(31,41,55,0.5); }
</style>

<script>
var tableData = [];
var sortDir   = {};

function renderTable(rows) {
    var html = '';
    for (var i = 0; i < rows.length; i++) {
        var r = rows[i];
        html += '<tr>' +
            '<td class="px-4 py-2"><a href="/stock/' + r.symbol + '" class="text-blue-400 hover:text-blue-300 font-mono font-medium">' + r.symbol + '</a></td>' +
            '<td class="px-4 py-2 text-gray-300">' + r.name + '</td>' +
            '<td class="px-4 py-2 text-gray-400 font-mono">' + r.date + '</td>' +
            '<td class="px-4 py-2 text-gray-300">' + r.short.toFixed(2) + '%</td>' +
            '</tr>';
    }
    document.getElementById('tbody').innerHTML = html || '<tr><td colspan="4" class="px-4 py-6 text-center text-gray-500">No results</td></tr>';
    document.getElementById('count').textContent = '(' + rows.length + ' symbols displayed)';
}

function filteredData() {
    var q        = document.getElementById('filter').value.toUpperCase();
    var hideZero = document.getElementById('hide-zero').checked;
    return tableData.filter(function (r) {
        if (hideZero && r.short === 0) return false;
        if (q && r.symbol.indexOf(q) === -1 && r.name.toUpperCase().indexOf(q) === -1) return false;
        return true;
    });
}

function sortTable(col) {
    var keys = ['symbol', 'name', 'date', 'short'];
    var key  = keys[col];
    sortDir[col] = !sortDir[col];
    tableData.sort(function (a, b) {
        var va = a[key], vb = b[key];
        var cmp = (typeof va === 'number') ? va - vb : String(va).localeCompare(String(vb));
        return sortDir[col] ? cmp : -cmp;
    });
    renderTable(filteredData());
}

document.addEventListener('DOMContentLoaded', function () {
    document.getElementById('filter').addEventListener('input', function () { renderTable(filteredData()); });
    document.getElementById('hide-zero').addEventListener('change', function () { renderTable(filteredData()); });
});

function fmtDate(yyyymmdd) {
    if (!yyyymmdd) return '';
    var d = new Date(yyyymmdd.slice(0,4), yyyymmdd.slice(4,6)-1, yyyymmdd.slice(6,8));
    return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
}

fetch('/api/shorts')
    .then(function (r) { return r.json(); })
    .then(function (resp) {
        tableData = resp.data;
        if (resp.latest_date) {
            document.getElementById('as-of').textContent = 'as of ' + fmtDate(resp.latest_date);
        }
        renderTable(filteredData());
    });
</script>
{% endblock %}
