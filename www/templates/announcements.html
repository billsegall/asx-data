{% extends "base.html" %}

{% block title %}ASX Announcements{% endblock %}

{% block content %}
<div class="flex flex-wrap items-center justify-between gap-4 mb-4">
    <h1 class="text-2xl font-bold text-white">
        Announcements
        <span id="count" class="text-gray-500 font-normal text-base ml-2"></span>
    </h1>
    <div class="flex items-center gap-4">
        <label class="flex items-center gap-2 text-sm text-gray-400 cursor-pointer select-none">
            <input id="hide-nonsensitive" type="checkbox" class="accent-blue-500 w-4 h-4">
            Price sensitive only
        </label>
        <input id="filter" type="text" placeholder="Filter by ticker or headline&hellip;"
               class="bg-gray-800 border border-gray-700 text-gray-100 text-sm rounded px-3 py-1.5 w-80 focus:outline-none focus:border-blue-500"
               autocomplete="off">
    </div>
</div>

<div class="overflow-x-auto rounded-lg border border-gray-800">
    <table id="ann-table" class="w-full text-sm">
        <thead>
            <tr class="bg-gray-900 text-gray-400 text-left select-none">
                <th class="px-4 py-3 font-medium hover:text-white cursor-pointer" onclick="sortTable(0)">Time &#x21C5;</th>
                <th class="px-4 py-3 font-medium hover:text-white cursor-pointer" onclick="sortTable(1)">Ticker &#x21C5;</th>
                <th class="px-4 py-3 font-medium">Headline</th>
                <th class="px-4 py-3 font-medium hover:text-white cursor-pointer" onclick="sortTable(3)">Pages &#x21C5;</th>
            </tr>
        </thead>
        <tbody id="tbody">
            <tr><td colspan="4" class="px-4 py-6 text-center text-gray-500">Loading&hellip;</td></tr>
        </tbody>
    </table>
</div>

<style>
#ann-table tbody tr { border-top: 1px solid #1f2937; }
#ann-table tbody tr:hover { background: rgba(31,41,55,0.5); }
#ann-table tbody tr:nth-child(odd) { background: rgba(17,24,39,0.3); }
#ann-table tbody tr:nth-child(odd):hover { background: rgba(31,41,55,0.5); }
</style>

<script>
var tableData = [];
var sortDir   = {};

function fmtTime(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' }) +
           ' ' + d.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
}

function renderTable(rows) {
    var html = '';
    for (var i = 0; i < rows.length; i++) {
        var a = rows[i];
        var badge = a.price_sensitive
            ? '<span class="ml-2 px-1.5 py-0.5 rounded text-xs bg-yellow-900 text-yellow-300">PS</span>'
            : '';
        html += '<tr>' +
            '<td class="px-4 py-2 text-gray-400 font-mono whitespace-nowrap">' + fmtTime(a.announced_at) + '</td>' +
            '<td class="px-4 py-2"><a href="/stock/' + a.ticker + '" class="text-blue-400 hover:text-blue-300 font-mono font-medium">' + a.ticker + '</a></td>' +
            '<td class="px-4 py-2 text-gray-300"><a href="/api/announcements/' + a.ids_id + '/pdf" target="_blank" class="hover:text-white">' + a.headline + '</a>' + badge + '</td>' +
            '<td class="px-4 py-2 text-gray-500 text-right">' + (a.page_count || '') + '</td>' +
            '</tr>';
    }
    document.getElementById('tbody').innerHTML = html ||
        '<tr><td colspan="4" class="px-4 py-6 text-center text-gray-500">No results</td></tr>';
    document.getElementById('count').textContent = '(' + rows.length + ' announcements)';
}

function filteredData() {
    var q    = document.getElementById('filter').value.toUpperCase();
    var psOnly = document.getElementById('hide-nonsensitive').checked;
    return tableData.filter(function (a) {
        if (psOnly && !a.price_sensitive) return false;
        if (q && a.ticker.indexOf(q) === -1 && a.headline.toUpperCase().indexOf(q) === -1) return false;
        return true;
    });
}

function sortTable(col) {
    var keys = ['announced_at', 'ticker', null, 'page_count'];
    var key  = keys[col];
    if (!key) return;
    sortDir[col] = !sortDir[col];
    tableData.sort(function (a, b) {
        var va = a[key], vb = b[key];
        var cmp = (typeof va === 'number') ? va - vb : String(va).localeCompare(String(vb));
        return sortDir[col] ? cmp : -cmp;
    });
    renderTable(filteredData());
}

document.getElementById('filter').addEventListener('input', function () { renderTable(filteredData()); });
document.getElementById('hide-nonsensitive').addEventListener('change', function () { renderTable(filteredData()); });

fetch('/api/announcements')
    .then(function (r) { return r.json(); })
    .then(function (data) { tableData = data; renderTable(filteredData()); })
    .catch(function () {
        document.getElementById('tbody').innerHTML =
            '<tr><td colspan="4" class="px-4 py-6 text-center text-gray-500">Announcements unavailable.</td></tr>';
    });
</script>
{% endblock %}
